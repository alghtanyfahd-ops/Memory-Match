<!doctype html>
<html lang="ar" dir="rtl">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Memory Match - Pi Game</title>

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    font-family:system-ui,sans-serif;
    background:#101827;
    color:white;
    min-height:100vh;

}


.app{

    max-width:900px;
    margin:auto;
    padding:24px;

}


.card{

    background:#1e293b;
    border:1px solid #334155;
    border-radius:18px;
    padding:22px;
    box-shadow:0 10px 30px #0004;

}


h1,h2{

    color:#fbbf24;

}


.hidden{

    display:none;

}


input,button{

    font:inherit;
    border-radius:10px;
    padding:11px;
    border:0;

}


input{

    width:100%;
    margin:7px 0;
    background:white;
    color:#111;

}


button{

    background:#fbbf24;
    color:#111;
    font-weight:800;
    cursor:pointer;
    margin:6px 0;

}


button:disabled{

    opacity:.6;

}


.bar,
.stats,
.actions{

    display:flex;
    gap:10px;
    flex-wrap:wrap;

}


.bar{

    align-items:center;
    justify-content:space-between;
    margin:15px 0;

}


.pill{

    background:#334155;
    padding:8px 12px;
    border-radius:999px;

}


.grid{

    display:grid;
    gap:10px;
    margin-top:20px;

}


.tile{

    aspect-ratio:1;
    background:#334155;
    border-radius:14px;
    display:grid;
    place-items:center;
    font-size:clamp(22px,6vw,46px);

}


.tile.open,
.tile.done{

    background:white;
    color:#111;

}


.tile.done{

    background:#86efac;

}


.leader li{

    padding:8px;
    border-bottom:1px solid #334155;

}

</style>

</head>


<body>


<main class="app"><section id="login" class="card">

<h1>
لعبة مطابقة الذاكرة
</h1>

<p>
طابق البطاقات، اجمع العملات، وتقدم عبر 70 مستوى.
</p>


<input 
id="name"
maxlength="18"
placeholder="اكتب اسم اللاعب"
/>


<button onclick="start()">
ابدأ اللعبة
</button>


<button onclick="loginWithPi()">
تسجيل الدخول عبر Pi
</button>


</section>



<section id="game" class="hidden">


<div class="bar">

<h1>
Memory Match
</h1>


<div class="actions">


<button id="musicBtn">
تشغيل موسيقى هادئة 🎵
</button>


<button onclick="resetGame()">
إعادة المستوى
</button>


<button onclick="logout()">
خروج
</button>


</div>

</div>



<div class="stats">


<span class="pill">
اللاعب:
<b id="who"></b>
</span>


<span class="pill">
المستوى:
<b id="level"></b>
/70
</span>


<span class="pill">
النقاط:
<b id="score"></b>
</span>


<span class="pill">
العملات:
<b id="coins"></b>
</span>


<span class="pill">
الحركات:
<b id="moves"></b>
</span>


</div>



<div id="grid" class="grid"></div>



<section class="card" style="margin-top:18px">

<h2>
لوحة المتصدرين
</h2>


<ol id="board" class="leader"></ol>


</section>


</section></main>


<script>

let audioCtx;
let musicOn = false;
let musicTimer;
let musicStep = 0;


document
.getElementById("musicBtn")
.onclick = () => {

    if(!musicOn){

        audioCtx = new (
            window.AudioContext ||
            window.webkitAudioContext
        )();

        musicOn = true;

        document
        .getElementById("musicBtn")
        .textContent =
        "إيقاف الموسيقى 🔇";

    }else{

        if(audioCtx){
            audioCtx.close();
            audioCtx = null;
        }

        musicOn = false;

        document
        .getElementById("musicBtn")
        .textContent =
        "تشغيل موسيقى هادئة 🎵";
    }

};


window.onload = () => {

    if(localStorage.mmPlayer){

        document
        .getElementById("name")
        .value =
        localStorage.mmPlayer;

    }

};

   <script>
function openGame(){

    localStorage.mmPlayer = player;

    document
    .getElementById("login")
    .classList
    .add("hidden");


    document
    .getElementById("game")
    .classList
    .remove("hidden");


    if(typeof newLevel === "function"){

        newLevel();

    }

}
</script>


<script src="game.js"></script>

<script src="pi.js"></script>

alert("openGame تعمل");
<script src="game.js"></script>
</body>

</html>
