<!doctype html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ميموري ماتش</title>

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui;background:#101827;color:#fff;min-height:100vh}
    .app{max-width:900px;margin:auto;padding:24px}
    .card{background:#1e293b;border:1px solid #334155;border-radius:18px;padding:22px;box-shadow:0 10px 30px #0004}
    h1{margin:0 0 14px;color:#fbbf24}
    .hidden{display:none}
    input,button{font:inherit;border-radius:10px;padding:11px;border:0}
    input{width:100%;margin:7px 0;background:#fff;color:#111}
    button{background:#fbbf24;color:#111;font-weight:800;cursor:pointer;margin:6px 0}
    button:hover{filter:brightness(1.08)}
    .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin:15px 0}
    .stats{display:flex;gap:10px;flex-wrap:wrap}
    .pill{background:#334155;padding:8px 12px;border-radius:999px}
    .grid{display:grid;gap:10px;grid-template-columns:repeat(4,1fr)}
    .tile{aspect-ratio:1;background:#334155;border-radius:14px;display:grid;place-items:center;font-size:clamp(25px,7vw,46px);transition:.2s}
    .tile.open,.tile.done{background:#fff;color:#111}
    .tile.done{background:#86efac}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .leader li{padding:8px;border-bottom:1px solid #334155}
    .note{color:#cbd5e1;font-size:.92em}
  </style>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
  Pi.init({ version: "2.0", sandbox: true });

  async function loginWithPi() {
    try {
      const auth = await Pi.authenticate(
        ["username"],
        function onIncompletePaymentFound(payment) {
          console.log(payment);
        }
      );

      player = auth.user.username;
      document.getElementById("name").value = player;
      openGame();
    } catch (error) {
      console.error(error);
      alert("لم يتم تسجيل الدخول. جرّب من داخل Pi Browser.");
    }
  }
</script>
</body>
</html>
