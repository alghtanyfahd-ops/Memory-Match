<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Match MGC</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0f172a;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.app{
width:100%;
max-width:900px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:18px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.hidden{
display:none;
}

h1,h2{
text-align:center;
color:#fbbf24;
margin-bottom:15px;
}

p{
text-align:center;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#fbbf24;
font-weight:bold;
cursor:pointer;
margin:5px;
}

button:hover{
opacity:.9;
}

.stats{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:20px 0;
}

.pill{
background:#334155;
padding:8px 12px;
border-radius:30px;
}

.grid{
display:grid;
gap:10px;
margin-top:20px;
}

.tile{
aspect-ratio:1;
background:#334155;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
cursor:pointer;
user-select:none;
}

.tile.open{
background:white;
color:black;
}

.tile.done{
background:#22c55e;
color:white;
}

.note{
font-size:14px;
color:#cbd5e1;
text-align:center;
margin-top:10px;
}

.leader{
margin-top:15px;
}

.leader li{
padding:8px;
border-bottom:1px solid #334155;
}

</style>

</head>

<body>

<div class="app">

<section id="login" class="card">

<h1>لعبة مطابقة الذاكرة</h1>

<p>طابق جميع البطاقات وأكمل 70 مستوى لتحصل على مكافأة MGC.</p>

<input
id="name"
type="text"
maxlength="18"
placeholder="اسم اللاعب">

<button onclick="start()">
ابدأ اللعبة
</button>

<button onclick="loginWithPi()">
تسجيل الدخول بواسطة Pi
</button>

<p class="note">
أدخل عنوان محفظة Stellar بعد تسجيل الدخول.
</p>

<input
id="walletAddress"
type="text"
maxlength="56"
placeholder="عنوان يبدأ بـ G">

</section>

<section id="game" class="card hidden">

<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">

<h1>Memory Match</h1>

<div>

<button id="musicBtn">
🎵 الموسيقى
</button>

<button onclick="resetGame()">
إعادة
</button>

<button onclick="logout()">
خروج
</button>

</div>

</div>

<div class="stats">

<span class="pill">
اللاعب :
<b id="who"></b>
</span>

<span class="pill">
المستوى :
<b id="level"></b>/70
</span>

<span class="pill">
النقاط :
<b id="score"></b>
</span>

<span class="pill">
الحركات :
<b id="moves"></b>
</span>

<span class="pill">
المربعات :
<b id="tiles"></b>
</span>

</div>

<section
id="rewardCard"
class="card hidden"
style="margin-top:20px">

<h2>مكافأة إكمال اللعبة</h2>

<p class="note">
بعد إنهاء المستوى 70 يمكنك استلام 10 MGC.
</p>

<button
id="claimMgcBtn"
onclick="claimMgc()">

استلام 10 MGC

</button>

<p id="claimStatus"></p>

</section>

<div
id="grid"
class="grid">
</div>

<section
class="card"
style="margin-top:20px">

<h2>لوحة المتصدرين</h2>

<ol id="board" class="leader"></ol>

</section>

</section>

<script>

let audioCtx;
let musicOn = false;
let musicTimer;
let musicStep = 0;

let player = "";
let level = 1;
let score = 0;
let moves = 0;
let first = null;
let lock = false;
let deck = [];

let piUser = null;
let piReady = false;

const MAX_LEVEL = 70;

const SYMBOLS = [
"🐶","🐱","🐭","🐰","🦊","🐼","🐨","🐯","🦁","🐸",
"🐵","🐷","🐮","🐔","🐧","🦄","🐝","🦋","🐢","🐬",
"1","2","3","4","5","6","7","8","9","0",
"🏠","🏡","🏢","🏰","🚗","🚕","🚌","🚙",
"🌱","🌿","🌵","🌳","🌸","🌻","🌹","🍀"
];

async function initPi(){

    if(piReady) return;

    Pi.init({
        version:"2.0",
        sandbox:true
    });

    piReady = true;

}

initPi();

function start(){

    player = document.getElementById("name").value.trim();

    if(player===""){

        alert("اكتب اسم اللاعب أولاً");

        return;

    }

    level = 1;
    score = 0;

    openGame();

}

async function loginWithPi(){

    try{

        await initPi();

        const auth = await Pi.authenticate(["username"]);

        piUser = auth.user;

        window.piAccessToken = auth.accessToken;

        player = auth.user.username;

        document.getElementById("name").value = player;

        openGame();

    }catch(err){

        alert("تعذر تسجيل الدخول عبر Pi");

        console.error(err);

    }

}

function openGame(){

    document.getElementById("login").classList.add("hidden");

    document.getElementById("game").classList.remove("hidden");

    document.getElementById("who").textContent = player;

    newLevel();

}

function getPairsForLevel(){

    return Math.min(4 + Math.floor((level - 1) / 2),22);

}

function getColumns(total){

    if(total<=16) return 4;

    if(total<=24) return 5;

    if(total<=36) return 6;

    return 7;

}

function newLevel(){

    moves=0;

    first=null;

    lock=false;

    const pairs=getPairsForLevel();

    const symbols=SYMBOLS.slice(0,pairs);

    deck=[...symbols,...symbols]
    .sort(()=>Math.random()-0.5)
    .map(v=>({
        v:v,
        open:false,
        done:false
    }));

    render();

}

function render(){

    document.getElementById("level").textContent=level;

    document.getElementById("score").textContent=score;

    document.getElementById("moves").textContent=moves;

    document.getElementById("tiles").textContent=deck.length;

    const grid=document.getElementById("grid");

    grid.innerHTML="";

    grid.style.gridTemplateColumns=
    repeat(${getColumns(deck.length)},1fr);

    deck.forEach((card,index)=>{

        const button=document.createElement("button");

        button.className="tile";

        if(card.open || card.done){

            button.classList.add("open");

            button.textContent=card.v;

        }else{

            button.textContent="?";

        }

        if(card.done){

            button.classList.add("done");

        }

        button.onclick=()=>flip(index);

        grid.appendChild(button);

    });

    leaders();

}

function flip(index){

    const card=deck[index];

    if(lock  card.open  card.done){

        return;

    }

    card.open=true;

    render();

    if(first===null){

        first=index;

        return;

    }

    moves++;

    const previous=deck[first];

    if(previous.v===card.v){

        previous.done=true;

        card.done=true;

        score+=10+level;

        first=null;

        if(deck.every(x=>x.done)){

            lock=true;

            setTimeout(()=>{

                if(level<MAX_LEVEL){

                    level++;

                    saveProgress();

                    newLevel();

                }else{

                    addLeader();

                    saveProgress();

                    showRewardCard();

                    alert("🎉 مبروك لقد أنهيت جميع المراحل");

                    lock=false;

                    render();

                }

            },700);

        }

    }else{

        lock=true;

        setTimeout(()=>{

            previous.open=false;

            card.open=false;

            first=null;

            lock=false;

            render();

        },700);

    }

}
