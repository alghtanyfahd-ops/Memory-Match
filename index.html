<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Match</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #101827; color: #fff; min-height: 100vh; }
    .app { max-width: 900px; margin: auto; padding: 24px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 18px; padding: 22px; box-shadow: 0 10px 30px #0004; }
    h1 { margin: 0 0 14px; color: #fbbf24; }
    .hidden { display: none; }
    input, button { font: inherit; border-radius: 10px; padding: 11px; border: 0; }
    input { width: 100%; margin: 7px 0; background: #fff; color: #111; }
    button { background: #fbbf24; color: #111; font-weight: 800; cursor: pointer; margin: 6px 0; }
    .bar, .stats, .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .bar { align-items: center; justify-content: space-between; margin: 15px 0; }
    .pill { background: #334155; padding: 8px 12px; border-radius: 999px; }
    .grid { display: grid; gap: 10px; grid-template-columns: repeat(4, 1fr); }
    .tile { aspect-ratio: 1; background: #334155; border-radius: 14px; display: grid; place-items: center; font-size: clamp(25px, 7vw, 46px); }
    .tile.open, .tile.done { background: #fff; color: #111; }
    .tile.done { background: #86efac; }
    .leader li { padding: 8px; border-bottom: 1px solid #334155; }
    .note { color: #cbd5e1; font-size: .92em; }
  </style>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

</head>

<body>
  <main class="app">
    <section id="login" class="card">
      <h1>Memory Match</h1>
      <p>Match the cards, earn points, and reach the leaderboard.</p>

```
  <input id="name" maxlength="18" placeholder="Enter player name">
  <button onclick="start()">Play with Name</button>
  <button onclick="loginWithPi()">Login with Pi</button>
  <button onclick="startPayment()">Start Transaction</button>

  <p class="note">Open this game from Pi Browser for Pi login and payment.</p>
</section>

<section id="game" class="hidden">
  <div class="bar">
    <h1>Memory Match</h1>
    <div class="actions">
      <button onclick="resetGame()">Restart Level</button>
      <button onclick="startPayment()">Start Transaction</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats">
    <span class="pill">Player: <b id="who"></b></span>
    <span class="pill">Level: <b id="level"></b></span>
    <span class="pill">Score: <b id="score"></b></span>
    <span class="pill">Moves: <b id="moves"></b></span>
  </div>

  <div id="grid" class="grid"></div>

  <section class="card" style="margin-top:18px">
    <h2>Leaderboard</h2>
    <ol id="board" class="leader"></ol>
  </section>
</section>
```

  </main>

  <script>
    let player = "";
    let level = 1;
    let score = 0;
    let moves = 0;
    let first = null;
    let lock = false;
    let deck = [];

    const sets = [
      ["A", "B", "C", "D"],
      ["E", "F", "G", "H", "I", "J"],
      ["K", "L", "M", "N", "O", "P", "Q", "R"]
    ];

    function start() {
      player = document.getElementById("name").value.trim();
      if (!player) return alert("Enter a player name first.");
      openGame();
    }

    function openGame() {
      localStorage.mmPlayer = player;
      document.getElementById("login").classList.add("hidden");
      document.getElementById("game").classList.remove("hidden");
      newLevel();
    }

    function newLevel() {
      moves = 0;
      first = null;
      lock = false;
      const symbols = sets[Math.min(level - 1, 2)];
      deck = [...symbols, ...symbols]
        .sort(() => Math.random() - 0.5)
        .map(value => ({ value, open: false, done: false }));
      render();
    }

    function render() {
      document.getElementById("who").textContent = player;
      document.getElementById("level").textContent = level;
      document.getElementById("score").textContent = score;
      document.getElementById("moves").textContent = moves;

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      deck.forEach((card, index) => {
        const button = document.createElement("button");
        button.className = "tile " + ((card.open || card.done) ? "open" : "") + (card.done ? " done" : "");
        button.textContent = (card.open || card.done) ? card.value : "?";
        button.onclick = () => flip(index);
        grid.appendChild(button);
      });

      leaders();
    }

    function flip(index) {
      const card = deck[index];
      if (lock || card.open || card.done) return;

      card.open = true;

      if (first === null) {
        first = index;
        render();
        return;
      }

      moves++;
      const firstCard = deck[first];

      if (firstCard.value === card.value) {
        firstCard.done = true;
        card.done = true;
        score += Math.max(10, 50 - moves);
        first = null;
        render();
        if (deck.every(item => item.done)) setTimeout(win, 350);
      } else {
        lock = true;
        render();
        setTimeout(() => {
          firstCard.open = false;
          card.open = false;
          first = null;
          lock = false;
          render();
        }, 700);
      }
    }

    function win() {
      save();
      if (level < 3) {
        alert("Level complete.");
        level++;
        newLevel();
      } else {
        alert("Game complete. Final score: " + score);
        level = 1;
        score = 0;
        newLevel();
      }
    }

    function save() {
      const list = JSON.parse(localStorage.mmLeaders || "[]");
      list.push({ n: player, s: score, d: new Date().toLocaleDateString("en") });
      list.sort((a, b) => b.s - a.s);
      localStorage.mmLeaders = JSON.stringify(list.slice(0, 10));
    }

    function leaders() {
      const list = JSON.parse(localStorage.mmLeaders || "[]");
      document.getElementById("board").innerHTML = list.length
        ? list.map(item => `<li><b>${item.n}</b> - ${item.s} points</li>`).join("")
        : "<li>No scores yet.</li>";
    }

    function resetGame() {
      newLevel();
    }

    function logout() {
      location.reload();
    }

    Pi.init({ version: "2.0", sandbox: true });

    async function loginWithPi() {
      try {
        const auth = await Pi.authenticate(["username"], function (payment) {
          console.log("Incomplete Pi payment:", payment);
        });

        player = auth.user.username;
        document.getElementById("name").value = player;
        openGame();
      } catch (error) {
        console.error(error);
        alert("Pi login was not completed. Open the game in Pi Browser.");
      }
    }

    async function startPayment() {
      try {
        await Pi.createPayment(
          {
            amount: 1,
            memo: "Memory Match test payment",
            metadata: { game: "memory-match" }
          },
          {
            onReadyForServerApproval: async function (paymentId) {
              const response = await fetch("/api/createPayment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  action: "approve",
                  paymentId: paymentId
                })
              });

              if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || "Payment approval failed");
              }
            },

            onReadyForServerCompletion: async function (paymentId, txid) {
              const response = await fetch("/api/createPayment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  action: "complete",
                  paymentId: paymentId,
                  txid: txid
                })
              });

              if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || "Payment completion failed");
              }

              alert("Payment completed successfully.");
            },

            onCancel: function (paymentId) {
              console.log("Payment canceled:", paymentId);
              alert("Payment canceled.");
            },

            onError: function (error) {
              console.error("Pi payment error:", error);
              alert("Payment error.");
            }
          }
        );
      } catch (error) {
        console.error("Payment start error:", error);
        alert("Could not start payment.");
      }
    }

    window.onload = () => {
      if (localStorage.mmPlayer) {
        document.getElementById("name").value = localStorage.mmPlayer;
      }
    };
  </script>

</body>
</html>
