<!doctype html>
<html lang="ar" dir="rtl">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Memory Match - Pi Game</title>

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

*{
    box-sizing:border-box;
}


/* ==========================
   Pi Browser Mobile Design
========================== */


*{
    box-sizing:border-box;
}


body{

    margin:0;

    padding:15px;

    font-family:
    Arial,
    sans-serif;

    background:
    linear-gradient(
        135deg,
        #141e30,
        #243b55
    );

    color:white;

    text-align:center;

    min-height:100vh;

}


/* عنوان اللعبة */

h1{

    font-size:28px;

    margin:10px;

}


/* صندوق المعلومات */

#info,
.stats{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:8px;

    margin:10px auto;

}


#info div,
.stats div{

    background:
    rgba(255,255,255,.15);

    padding:8px 12px;

    border-radius:15px;

    font-size:15px;

}


/* شبكة البطاقات */

#grid{

    width:100%;

    max-width:500px;

    margin:auto;

    display:grid;

    gap:8px;

    position:relative;

}


/* البطاقات */

.tile{

    aspect-ratio:1/1;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
        145deg,
        #667eea,
        #764ba2
    );

    color:white;

    font-size:28px;

    box-shadow:
    0 5px 15px #0005;

    transition:.25s;

}


.tile:active{

    transform:scale(.9);

}


.tile.open{

    background:white;

    color:#333;

}


.tile.done{

    background:#00c853;

}


/* الأزرار */

button{

    border:none;

    border-radius:20px;

    padding:12px 20px;

    margin:5px;

    font-size:16px;

    cursor:pointer;

    background:#ffca28;

}


/* الهاتف الصغير */

@media(max-width:380px){

    .tile{

        font-size:22px;

    }


    button{

        width:90%;

    }

}
    margin:0;
    font-family:system-ui,sans-serif;
    background:#101827;
    color:white;
    min-height:100vh;

}


.app{

    max-width:900px;
    margin:auto;
    padding:24px;

}


.card{

    background:#1e293b;
    border:1px solid #334155;
    border-radius:18px;
    padding:22px;
    box-shadow:0 10px 30px #0004;

}


h1,h2{

    color:#fbbf24;

}


.hidden{

    display:none;

}


input,button{

    font:inherit;
    border-radius:10px;
    padding:11px;
    border:0;

}


input{

    width:100%;
    margin:7px 0;
    background:white;
    color:#111;

}


button{

    background:#fbbf24;
    color:#111;
    font-weight:800;
    cursor:pointer;
    margin:6px 0;

}


button:disabled{

    opacity:.6;

}


.bar,
.stats,
.actions{

    display:flex;
    gap:10px;
    flex-wrap:wrap;

}


.bar{

    align-items:center;
    justify-content:space-between;
    margin:15px 0;

}


.pill{

    background:#334155;
    padding:8px 12px;
    border-radius:999px;

}


.grid{

    display:grid;
    gap:10px;
    margin-top:20px;

}


.tile{

    aspect-ratio:1;
    background:#334155;
    border-radius:14px;
    display:grid;
    place-items:center;
    font-size:clamp(22px,6vw,46px);

}


.tile.open,
.tile.done{

    background:white;
    color:#111;

}


.tile.done{

    background:#86efac;

}


.leader li{

    padding:8px;
    border-bottom:1px solid #334155;

}
.welcome{

    text-align:center;

}

.logo{

    font-size:70px;

    margin-bottom:15px;

    animation:floatLogo 2s infinite ease-in-out;

}

@keyframes floatLogo{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

}

.welcome h1{

    color:#FFD54F;

    font-size:34px; 
}
.wheel-modal{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.7);

display:flex;

justify-content:center;

align-items:center;

z-index:9999;

}

.wheel-box{

background:white;

padding:20px;

border-radius:20px;

text-align:center;

width:360px;

max-width:95%;

}

.pointer{

font-size:30px;

color:red;

margin-bottom:-10px;

}

.wheel-close{

float:right;

background:red;

color:white;

border:none;

border-radius:50%;

width:35px;

height:35px;

}



display:none;

}
</style>

</head>


<body>


<main class="app"><section id="login" class="card welcome">

<div class="logo">
🧠🎴
</div>

<h1>
Memory Match
</h1>

<p>
🎮 طابق البطاقات واجمع العملات<br>
🏆 تقدم عبر 70 مستوى<br>
🪙 اربح مكافآت يومية وعجلة الحظ
</p>


<input 
id="name"
maxlength="18"
placeholder="اكتب اسم اللاعب"
/>


<button onclick="start()">
ابدأ اللعبة
</button>


<button onclick="loginWithPi()">
تسجيل الدخول عبر Pi
</button>


</section>



<section id="game" class="hidden">


<div class="bar">

<h1>
Memory Match
</h1>


<div class="actions">


<button id="musicBtn">
تشغيل موسيقى هادئة 🎵
</button>
<button 
style="position:relative; z-index:9999;"
onclick="openWheel()">

🎡 عجلة الحظ

</button>


<button onclick="logout()">
خروج
</button>


</div>

</div>



<div class="stats">


<span class="pill">
اللاعب:
<b id="who"></b>
</span>


<span class="pill">
المستوى:
<b id="level"></b>
/70
</span>


<span class="pill">
النقاط:
<b id="score"></b>
</span>


<span class="pill">
العملات:
<b id="coins"></b>
</span>


<span class="pill">
الحركات:
<b id="moves"></b>
</span>


</div>



<div id="grid" class="grid"></div>



<section class="card" style="margin-top:18px">

<h2>
لوحة المتصدرين
</h2>


<ol id="board" class="leader"></ol>


</section>


</section><div id="wheelModal" class="wheel-modal hidden">

<div class="wheel-box">

<button class="wheel-close"
onclick="closeWheel()">
✖
</button>

<h2>🎡 عجلة الحظ اليومية</h2>

<div class="pointer">
▲
</div>

<canvas
id="wheelCanvas"
width="320"
height="320">
</canvas>

<br>

<button onclick="spinWheel()">
تدوير
</button>

</div>

</div> </main>


<script>

    

let music = new Audio(
    "melo-rock-13-by-ende-dot-app.mp3"
);

music.loop = true;
music.volume = 0.25;

let musicOn = false;


document
.getElementById("musicBtn")
.onclick = function(){


    if(!musicOn){


        music.play()
        .then(()=>{

            musicOn = true;

            this.textContent =
            "إيقاف الموسيقى 🔇";

        })
        .catch(error=>{

            console.log(
                "Music error:",
                error
            );

        });


    }else{


        music.pause();

        music.currentTime = 0;


        musicOn = false;


        this.textContent =
        "تشغيل موسيقى هادئة 🎵";


    }

};
window.onload = () => {

    if(localStorage.mmPlayer){

        document.getElementById("name").value =
        localStorage.mmPlayer;

    }

};

</script>

<script src="game.js"></script>

<script src="pi.js"></script>

<script src="confetti.js"></script>    
<script src="wheel.js"></script>
</body>
</html>
